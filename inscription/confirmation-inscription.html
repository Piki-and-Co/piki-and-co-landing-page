<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="../css/style-inscription.css" rel="stylesheet" />
    <link rel="icon" type="image/x-icon" href="../assets/logo.ico"/>
	<title>Piki & Co</title>
    
	<script>
        document.addEventListener('DOMContentLoaded', () => {
            window.onscroll = function() {
                const nav = document.querySelector('.navbar');
                if (nav && window.scrollY > 1050) {
                    nav.classList.add('scrolled');
                } else if (nav) {
                    nav.classList.remove('scrolled');
                }
            };
        });
    </script>
<!-- CMP tarteaucitron — Gestion du consentement cookies -->
<script src="https://cdn.jsdelivr.net/npm/tarteaucitronjs@latest/tarteaucitron.js"></script>
<script src="../js/tarteaucitron-init.js"></script>
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar">
        <div class="logo">
			<a href="../index.html">
                <img
				src="../assets/logo.png"
				srcset="
					../assets/logo_small.webp 256w,
					../assets/logo_small.png 256w,
					../assets/logo_medium.webp 512w,
					../assets/logo_medium.png 512w,
					assets/logo.webp 1000w,
					assets/logo.png 1000w
				"
				sizes="85px"
				alt="Piki & Co"
				>
            </a>
        </div>
		<a href="../index.html" class="btn-nav">Revenir à la page d'accueil</a>
        </div>
    </nav>
    <section class="hero">
		<h2 class="section-heading">Merci d'avoir rejoint notre communauté !</h2>
		<p>Vous allez recevoir un e-mail vous permettant de confirmer votre adresse.</p>
	</section>
</body>
