<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="../css/style-inscription.css" rel="stylesheet" />
    <link rel="icon" type="image/x-icon" href="../assets/logo.ico"/>
	<title>Piki & Co</title>
    
	<script>
        document.addEventListener('DOMContentLoaded', () => {
            window.onscroll = function() {
                const nav = document.querySelector('.navbar');
                if (nav && window.scrollY > 1050) {
                    nav.classList.add('scrolled');
                } else if (nav) {
                    nav.classList.remove('scrolled');
                }
            };
        });
    </script>
<!-- Matomo -->
<script>
  var _paq = window._paq = window._paq || [];
  /* tracker methods like "setCustomDimension" should be called before "trackPageView" */
  _paq.push(["setCookieDomain", "*.piki-and-co.com"]);
  _paq.push(["setDomains", ["*.piki-and-co.com"]]);
  _paq.push(['trackPageView']);
  _paq.push(['enableLinkTracking']);
  (function() {
    var u="//an.kjbconseil.com/";
    _paq.push(['setTrackerUrl', u+'matomo.php']);
    _paq.push(['setSiteId', '6']);
    var d=document, g=d.createElement('script'), s=d.getElementsByTagName('script')[0];
    g.async=true; g.src=u+'matomo.js'; s.parentNode.insertBefore(g,s);
  })();
</script>
<noscript><p><img referrerpolicy="no-referrer-when-downgrade" src="//an.kjbconseil.com/matomo.php?idsite=6&amp;rec=1" style="border:0;" alt="" /></p></noscript>
<!-- End Matomo Code -->

        </div>
    </nav>
    <section class="hero">

		<p>A bientôt !</p>
	</section>
